name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer config --global policy.advisories.block false
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest

  test-without-pennant:
    runs-on: ubuntu-latest
    name: Without optional Pennant dependency

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies without Pennant
        run: |
          composer config --global policy.advisories.block false
          composer update --prefer-dist --no-interaction --no-progress
          composer remove laravel/pennant --dev --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests (Pennant bridge suite skipped automatically)
        run: vendor/bin/pest

  security:
    runs-on: ubuntu-latest
    name: Dependency audit

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      # Install without the advisory block (the 11.x matrix needs that workaround), then run a
      # dedicated audit step so a vulnerable dependency still fails this job and is visible.
      - name: Install dependencies
        run: |
          composer config --global policy.advisories.block false
          composer update --prefer-dist --no-interaction --no-progress

      - name: Audit dependencies
        run: composer audit --no-interaction
